<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FanHub — Sin conexión</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #1f1f1f;
      --brand: #39ff14;
      --text: #ffffff;
      --muted: #6b7280;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .logo {
      margin-bottom: 2rem;
      opacity: 0.9;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2rem 2.5rem;
      max-width: 380px;
      width: 100%;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }
    p {
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(57, 255, 20, 0.08);
      border: 1px solid rgba(57, 255, 20, 0.2);
      color: var(--brand);
      border-radius: 9999px;
      padding: 0.35rem 0.9rem;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }
    button {
      width: 100%;
      background: var(--brand);
      color: #000;
      font-weight: 800;
      font-size: 0.875rem;
      padding: 0.8rem 1rem;
      border: none;
      border-radius: 0.625rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="logo">
    <svg width="64" height="64" viewBox="0 0 32 32" fill="none" aria-label="FanHub">
      <circle cx="16" cy="16" r="15" fill="#39ff14" fill-opacity="0.1" stroke="#39ff14" stroke-width="1.5"/>
      <polygon points="16,6 20,13 28,14 22,20 24,28 16,24 8,28 10,20 4,14 12,13"
               fill="none" stroke="#39ff14" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="16" cy="16" r="3" fill="#39ff14"/>
    </svg>
  </div>

  <div class="card">
    <div class="badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
      </svg>
      Sin conexión
    </div>
    <h1>No hay internet</h1>
    <p>
      Vuelve cuando tengas conexión para ver el ranking, verificar asistencias y ganar puntos.
    </p>
    <button onclick="window.location.reload()">Intentar de nuevo</button>
  </div>
</body>
</html>
